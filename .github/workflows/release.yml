name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # deno desktop is experimental; pin the version that the app was
      # developed and tested against.
      - uses: denoland/setup-deno@v2
        with:
          deno-version: "2.9.2"

      - name: Install dependencies
        run: npm ci

      - name: Build Linux .deb
        run: deno task compile:deb

      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: dist/TimeTracker.deb
          if-no-files-found: error

  # Windows could cross-compile from Linux, but Inno Setup and rcedit are both
  # Windows-only and deno's own .msi output is not usable (see installer.iss).
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: denoland/setup-deno@v2
        with:
          deno-version: "2.9.2"

      - name: Install dependencies
        run: npm ci

      - name: Read version
        id: version
        shell: pwsh
        run: |
          $v = (Get-Content package.json -Raw | ConvertFrom-Json).version
          "value=$v" >> $env:GITHUB_OUTPUT

      - name: Build Windows app directory
        run: deno task compile:win

      # deno copies the laufey backend stub verbatim, so the .exe ships with no
      # resource section at all: no icon in Explorer, the taskbar, or the Start
      # Menu, and no version info.
      - name: Stamp icon and version info into the executable
        shell: pwsh
        run: |
          choco install rcedit -y --no-progress
          $rcedit = "C:\ProgramData\chocolatey\bin\rcedit.exe"
          $v = "${{ steps.version.outputs.value }}"
          & $rcedit "dist\win\TimeTracker\TimeTracker.exe" `
            --set-icon "icons\app.ico" `
            --set-file-version "$v.0" `
            --set-product-version "$v.0" `
            --set-version-string "CompanyName" "Rafiul Awal" `
            --set-version-string "ProductName" "Time Tracker" `
            --set-version-string "FileDescription" "Time Tracker" `
            --set-version-string "OriginalFilename" "TimeTracker.exe"
          if ($LASTEXITCODE -ne 0) { throw "rcedit failed" }

      # The webview backend calls CreateCoreWebView2Environment and aborts with
      # "Failed to find an installed WebView2 runtime" when it is missing. The
      # evergreen bootstrapper is ~2MB and no-ops when the runtime is present.
      - name: Fetch WebView2 bootstrapper
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://go.microsoft.com/fwlink/p/?LinkId=2124703" `
            -OutFile "dist\win\MicrosoftEdgeWebview2Setup.exe"

      - name: Build installer
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            choco install innosetup -y --no-progress
          }
          & $iscc "/DMyAppVersion=${{ steps.version.outputs.value }}" "scripts\win\installer.iss"
          if ($LASTEXITCODE -ne 0) { throw "ISCC failed" }

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: dist/TimeTracker-Setup.exe
          if-no-files-found: error

  # The .app cannot be cross-compiled: deno desktop shells out to `sips` and
  # `iconutil` to turn the icon into an .icns, and both are macOS-only.
  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: denoland/setup-deno@v2
        with:
          deno-version: "2.9.2"

      - name: Install dependencies
        run: npm ci

      - name: Build macOS app (Apple Silicon)
        run: deno task compile:mac

      - name: Zip macOS bundle
        run: cd dist && zip -qry TimeTracker-macos-arm64.app.zip TimeTracker.app

      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: dist/TimeTracker-macos-arm64.app.zip
          if-no-files-found: error

  release:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/TimeTracker-Setup.exe
            dist/TimeTracker.deb
            dist/TimeTracker-macos-arm64.app.zip
