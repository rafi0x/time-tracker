name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # Windows and Linux cross-compile from Linux; their backends are plain
  # archives that deno desktop downloads.
  build-linux-windows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # deno desktop is experimental; pin the version that the app was
      # developed and tested against.
      - uses: denoland/setup-deno@v2
        with:
          deno-version: "2.9.2"

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        run: deno task compile:win

      - name: Build Linux .deb
        run: deno task compile:deb

      - uses: actions/upload-artifact@v4
        with:
          name: linux-windows
          path: |
            dist/TimeTracker.msi
            dist/TimeTracker.deb
          if-no-files-found: error

  # The .app cannot be cross-compiled: deno desktop shells out to `sips` and
  # `iconutil` to turn the icon into an .icns, and both are macOS-only.
  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: denoland/setup-deno@v2
        with:
          deno-version: "2.9.2"

      - name: Install dependencies
        run: npm ci

      - name: Build macOS app (Apple Silicon)
        run: deno task compile:mac

      - name: Zip macOS bundle
        run: cd dist && zip -qry TimeTracker-macos-arm64.app.zip TimeTracker.app

      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: dist/TimeTracker-macos-arm64.app.zip
          if-no-files-found: error

  release:
    needs: [build-linux-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/TimeTracker.msi
            dist/TimeTracker.deb
            dist/TimeTracker-macos-arm64.app.zip
